name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: typecheck · lint · test · build · budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache the downloaded real-media corpus keyed by the manifest (sha256-pinned).
      - name: Cache fixtures
        uses: actions/cache@v4
        with:
          path: fixtures/media
          key: fixtures-${{ hashFiles('fixtures/manifest.json') }}

      - name: Fetch + verify corpus
        run: bun run fetch-fixtures

      - name: Typecheck
        run: bun run typecheck

      - name: Lint + format
        run: bunx biome ci .

      - name: Test + coverage (≥90%)
        run: bun run test:cov

      - name: Build (ESM + .d.ts)
        run: bun run build

      - name: Bundle budgets
        run: bun run check-budgets

  # Cross-browser correctness (Chromium/WebKit/Firefox via Playwright) lands with the Phase 1 MVP,
  # when WebCodecs/GPU paths exist to exercise. Added as a separate matrix job at that point.
